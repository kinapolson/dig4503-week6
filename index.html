<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">
    <form id="checkout-form" novalidate>
      <h1>Checkout</h1>

      <!-- ── Contact ─────────────────────────────────── -->
      <section class="form-section">
        <h2>Contact Information</h2>

        <div class="field" id="field-name">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name"
                 autocomplete="name" placeholder="Jane Doe" />
          <span class="error" aria-live="polite"></span>
        </div>

        <div class="field" id="field-email">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email"
                 autocomplete="email" placeholder="jane@example.com" />
          <span class="error" aria-live="polite"></span>
        </div>

        <div class="field" id="field-phone">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone"
                 autocomplete="tel" placeholder="(555) 123-4567" />
          <span class="error" aria-live="polite"></span>
        </div>
      </section>

      <!-- ── Shipping ────────────────────────────────── -->
      <section class="form-section">
        <h2>Shipping Address</h2>

        <div class="field" id="field-address">
          <label for="address">Street Address</label>
          <input type="text" id="address" name="address"
                 autocomplete="street-address" placeholder="123 Main St" />
          <span class="error" aria-live="polite"></span>
        </div>

        <div class="field-row">
          <div class="field" id="field-city">
            <label for="city">City</label>
            <input type="text" id="city" name="city"
                   autocomplete="address-level2" placeholder="Orlando" />
            <span class="error" aria-live="polite"></span>
          </div>

          <div class="field" id="field-state">
            <label for="state">State</label>
            <select id="state" name="state" autocomplete="address-level1">
              <option value="">-- Select --</option>
              <option>AL</option><option>AK</option><option>AZ</option>
              <option>AR</option><option>CA</option><option>CO</option>
              <option>CT</option><option>DE</option><option>FL</option>
              <option>GA</option><option>HI</option><option>ID</option>
              <option>IL</option><option>IN</option><option>IA</option>
              <option>KS</option><option>KY</option><option>LA</option>
              <option>ME</option><option>MD</option><option>MA</option>
              <option>MI</option><option>MN</option><option>MS</option>
              <option>MO</option><option>MT</option><option>NE</option>
              <option>NV</option><option>NH</option><option>NJ</option>
              <option>NM</option><option>NY</option><option>NC</option>
              <option>ND</option><option>OH</option><option>OK</option>
              <option>OR</option><option>PA</option><option>RI</option>
              <option>SC</option><option>SD</option><option>TN</option>
              <option>TX</option><option>UT</option><option>VT</option>
              <option>VA</option><option>WA</option><option>WV</option>
              <option>WI</option><option>WY</option>
            </select>
            <span class="error" aria-live="polite"></span>
          </div>

          <div class="field" id="field-zip">
            <label for="zip">ZIP Code</label>
            <input type="text" id="zip" name="zip"
                   autocomplete="postal-code" placeholder="32816"
                   maxlength="10" />
            <span class="error" aria-live="polite"></span>
          </div>
        </div>
      </section>

      <!-- ── Payment ─────────────────────────────────── -->
      <section class="form-section">
        <h2>Payment Details</h2>

        <div class="field" id="field-card-name">
          <label for="card-name">Name on Card</label>
          <input type="text" id="card-name" name="card-name"
                 autocomplete="cc-name" placeholder="Jane Doe" />
          <span class="error" aria-live="polite"></span>
        </div>

        <div class="field" id="field-card-number">
          <label for="card-number">Card Number</label>
          <input type="text" id="card-number" name="card-number"
                 autocomplete="cc-number" placeholder="1234 5678 9012 3456"
                 maxlength="19" inputmode="numeric" />
          <span class="error" aria-live="polite"></span>
        </div>

        <div class="field-row">
          <div class="field" id="field-expiry">
            <label for="expiry">Expiration Date</label>
            <input type="text" id="expiry" name="expiry"
                   autocomplete="cc-exp" placeholder="MM / YY"
                   maxlength="7" inputmode="numeric" />
            <span class="error" aria-live="polite"></span>
          </div>

          <div class="field" id="field-cvv">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv"
                   autocomplete="cc-csc" placeholder="123"
                   maxlength="4" inputmode="numeric" />
            <span class="error" aria-live="polite"></span>
          </div>
        </div>
      </section>

      <button type="submit" id="submit-btn" disabled>Place Order</button>
    </form>

    <!-- ── Success overlay ──────────────────────────── -->
    <div id="success" class="hidden" role="alert">
      <div class="success-card">
        <div class="checkmark">&#10003;</div>
        <h2>Order Placed!</h2>
        <p>Thank you for your purchase. A confirmation has been sent to your email.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
